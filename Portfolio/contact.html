<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/shared.css">
    <link rel="shortcut icon" href="assets/Mstack favicon 01.png" type="image/x-icon">
    <title>Contact</title>
</head>
<body class="contact-page">
    <div class="page">
        <header>
            <p class="nom_prenom">HUNLEDE  <span class="prenom">AYI MOÏSE</span></p>
            <nav class="navbar">
                <ul class="nav_links" id="navLinks">
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="propos.html">A propos</a></li>
                    <li><a href="projet.html">Projets</a></li>
                    <li><a href="competence.html">Compétences</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>
        <main class="contact-layout">
            <section class="contact-copy">
                <p class="eyebrow">Contact</p>
                <h1>Vous avez un <span class="pro-tete">projet en tête</span> ?</h1>
                <p class="intro">
                    Décrivez votre idée, votre budget ou votre délai, et je vous répondrai rapidement.
                </p>

                <div class="contact-card-info">
                    <div>
                        <span class="info-label">Email</span>
                        <a href="mailto:ayimoisehunlede@gmail.com">ayimoisehunlede@gmail.com</a>
                    </div>
                    <div>
                        <span class="info-label">Disponibilité</span>
                        <p>Réponse sous 24 à 48h.</p>
                    </div>
                </div>
            </section>

            <section class="formulaire">
                <form action="mailto:ayimoisehunlede@gmail.com" method="post" enctype="text/plain" class="contact-form">
                    <div class="premier">
                        <div class="field">
                            <label for="Prénom">Votre prénom</label>
                            <input type="text" name="Prénom" id="Prénom" placeholder="Ex: Moïse" autocomplete="given-name" required>
                        </div>
                        <div class="field">
                            <label for="Nom">Votre nom</label>
                            <input type="text" name="Nom" id="Nom" placeholder="Ex: HUNLEDE" autocomplete="family-name" required>
                        </div>
                    </div>

                    <div class="field">
                        <label for="Sujet">Votre sujet</label>
                        <input type="text" name="Sujet" id="Sujet" placeholder="Ex: Développement d'un site web" required>
                    </div>

                    <div class="field">
                        <label for="Message">Votre message</label>
                        <textarea name="Message" id="Message" rows="8" placeholder="Décrivez votre besoin ici..." required></textarea>
                    </div>

                    <button type="submit">Envoyer le message</button>
                </form>
            </section>
        </main>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
